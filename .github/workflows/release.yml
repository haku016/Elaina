name: Build & Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - '*.md'
      - '.gitignore'

jobs:
  build-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pyinstaller-hooks-contrib Pillow

      - name: Bump patch version
        id: ver
        shell: pwsh
        run: |
          $content = [System.IO.File]::ReadAllText("app.py")
          $m = [regex]::Match($content, "VERSION\s*=\s*'(\d+\.\d+\.\d+)'")
          $cur = $m.Groups[1].Value
          $p   = $cur.Split('.')
          $p[2] = [int]$p[2] + 1
          $new = $p -join '.'
          $updated = $content -replace "VERSION\s*=\s*'$([regex]::Escape($cur))'", "VERSION      = '$new'"
          [System.IO.File]::WriteAllText("app.py", $updated)
          Write-Host "Bumped $cur -> $new"
          "current=$cur"  >> $env:GITHUB_OUTPUT
          "new=$new"       >> $env:GITHUB_OUTPUT
          "tag=v$new"      >> $env:GITHUB_OUTPUT

      - name: Build executable
        run: pyinstaller elaina.spec --clean --noconfirm
        shell: cmd

      - name: Package zip (exclude .env)
        shell: pwsh
        run: |
          $src  = "dist\App"
          $dest = "elaina.zip"
          $exclude = @(".env", "*.env")
          $files = Get-ChildItem $src -Recurse | Where-Object {
            $name = $_.Name
            -not ($exclude | Where-Object { $name -like $_ })
          }
          Compress-Archive -Path "$src\*" -DestinationPath $dest -Force
          Write-Host "Zipped $($files.Count) files -> $dest ($([math]::Round((Get-Item $dest).Length/1MB, 1)) MB)"

      - name: Commit version bump
        shell: pwsh
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.py
          git commit -m "chore: bump version to ${{ steps.ver.outputs.new }} [skip ci]"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.ver.outputs.tag }}
          name:       ${{ steps.ver.outputs.tag }}
          body:       "Automatic release from commit ${{ github.sha }}"
          files:      elaina.zip
          make_latest: true
